services:
  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode — no Zookeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9094:9094"   # external access (localhost:9094)
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # One-time topic creation (exits after topic is created)
  # ---------------------------------------------------------------------------
  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic ${KAFKA_TOPIC:-crypto_trades} \
          --partitions 3 --replication-factor 1
        echo "Topic '${KAFKA_TOPIC:-crypto_trades}' ready."
    restart: "no"

  # ---------------------------------------------------------------------------
  # Binance WebSocket → Kafka producer
  # ---------------------------------------------------------------------------
  producer:
    build:
      context: producer
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Spark cluster (master + worker)
  # The streaming job is started manually via: make stream
  # ---------------------------------------------------------------------------
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    command: /opt/spark/sbin/start-master.sh
    ports:
      - "8083:8080"   # Spark web UI (8080/8081/8082 taken by TLC stack)
      - "7078:7077"   # Spark master external port (7077 taken by TLC Spark)
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_NO_DAEMONIZE: "true"
    env_file: .env
    volumes:
      - ./spark/jobs:/opt/spark-jobs

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: "2g"
      SPARK_NO_DAEMONIZE: "true"
    env_file: .env
    volumes:
      - ./spark/jobs:/opt/spark-jobs
    depends_on:
      - spark-master

  # ---------------------------------------------------------------------------
  # Optional: Kafka UI (start with: make kafka-ui)
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    profiles:
      - ui
